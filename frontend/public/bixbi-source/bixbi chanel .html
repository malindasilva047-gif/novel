<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Details Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white p-8 rounded-lg shadow-sm border border-gray-200 flex flex-col md:flex-row gap-10">
        
        <div class="w-full md:w-1/3 flex flex-col items-center">
            <div class="w-64 h-96 bg-gray-100 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-200 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="text-gray-500 mt-2 font-medium">Add a cover</p>
            </div>
            <p class="text-xs text-gray-400 mt-4 text-center">Recommended size: 600x900 pixels</p>
        </div>

        <div class="w-full md:w-2/3">
            <h2 class="text-orange-600 font-bold text-lg border-b-2 border-orange-600 inline-block mb-6 pb-1">Story Details</h2>
            
            <form action="#" method="POST" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Title</label>
                    <input type="text" placeholder="Untitled Story" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-1 focus:ring-orange-500">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Description</label>
                    <textarea rows="6" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-1 focus:ring-orange-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Main Characters</label>
                    <div class="flex gap-2">
                        <input type="text" placeholder="Name" class="flex-1 border border-gray-300 p-2 rounded focus:outline-none focus:ring-1 focus:ring-orange-500">
                        <button type="button" class="bg-gray-100 border border-gray-300 px-4 rounded hover:bg-gray-200 text-xl font-bold">+</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Category</label>
                        <select class="w-full border border-gray-300 p-2 rounded bg-white">
                            <option>Select a category</option>
                            <option>Education</option>
                            <option>Story</option>
                            <option>Notes</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Tags</label>
                        <button type="button" class="border border-dashed border-gray-400 text-gray-500 px-3 py-1 rounded-full text-sm hover:bg-gray-50">+ Add a tag</button>
                    </div>
                </div>

                <hr class="border-gray-200">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Target Audience</label>
                        <select class="w-full border border-gray-300 p-2 rounded bg-white">
                            <option>Who is your primary audience?</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Language</label>
                        <select class="w-full border border-gray-300 p-2 rounded bg-white">
                            <option>English</option>
                            <option>Sinhala</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Copyright</label>
                    <select class="w-full border border-gray-300 p-2 rounded bg-white">
                        <option>All Rights Reserved</option>
                        <option>Creative Commons</option>
                    </select>
                    <p class="text-xs text-gray-400 mt-1">You do not allow your work to be used or adapted in any way without your permission.</p>
                </div>

                <div class="flex items-center justify-between">
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Rating</label>
                        <p class="text-xs text-gray-400">Your story is appropriate for all audiences.</p>
                    </div>
                    <div class="flex items-center">
                        <span class="mr-2 text-sm text-gray-500">Mature</span>
                        <div class="w-12 h-6 bg-gray-200 rounded-full relative p-1 cursor-pointer">
                            <div class="w-4 h-4 bg-white rounded-full shadow-md"></div>
                        </div>
                        <span class="ml-2 text-sm font-bold text-gray-400 uppercase">Off</span>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="bg-orange-600 text-white px-8 py-2 rounded font-bold hover:bg-orange-700 transition">Save Story</button>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
